<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Register</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #0f172a, #020617);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      background: rgba(30, 41, 59, 0.9);
      backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 16px;
      width: 340px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: none;
      background: #334155;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .popup {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      border-radius: 8px;
      display: none;
      font-weight: bold;
      z-index: 999;
    }

    .success { background: #22c55e; }
    .error { background: #ef4444; }
  </style>
</head>

<body>

<div id="popup" class="popup"></div>

<div class="container">
  <h2>Register</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <input id="confirm" type="password" placeholder="Confirm Password">

  <button onclick="register()">Register</button>

  <p style="text-align:center; margin-top:10px;">
    Sudah punya akun? 
    <a href="login.html" style="color:#60a5fa;">Login</a>
  </p>
</div>

<script>
function showPopup(msg, type) {
  const popup = document.getElementById("popup")
  popup.innerText = msg
  popup.className = "popup " + type
  popup.style.display = "block"

  setTimeout(() => popup.style.display = "none", 2000)
}

function register() {
  const username = document.getElementById("username").value
  const password = document.getElementById("password").value
  const confirm = document.getElementById("confirm").value

  if (password !== confirm) {
    showPopup("❌ Password tidak sama", "error")
    return
  }

 fetch("https://website-aditya-production.up.railway.app/register", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  credentials: "include",
  body: JSON.stringify({ username, password })
})
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      showPopup("✅ Register berhasil!", "success")

      setTimeout(() => {
        window.location.href = "login.html"
      }, 1000)
    } else {
      showPopup("❌ Username sudah dipakai", "error")
    }
  })
}
</script>

</body>
</html>
