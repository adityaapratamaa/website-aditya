<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

  .container{
  width:90%;
  max-width:350px;
}

*{box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
  margin:0;
  height:100vh;
  background:linear-gradient(135deg,#0f172a,#020617);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.container{
  background:rgba(30,41,59,.9);
  backdrop-filter:blur(12px);
  padding:40px;
  border-radius:16px;
  width:340px;
  box-shadow:0 10px 40px rgba(0,0,0,.6);
}

h2{text-align:center;margin-bottom:25px;}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:8px;
  border:none;
  background:#334155;
  color:white;
}

button{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:none;
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:.3s;
}
button:hover{transform:scale(1.03)}

.popup{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 20px;
  border-radius:8px;
  display:none;
  font-weight:bold;
  z-index:999;
}

.success{background:#22c55e;}
.error{background:#ef4444;}
</style>
</head>

<body>

<div id="popup" class="popup"></div>

<div class="container">
  <h2>Login</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <!-- 🔥 FIX: TYPE BUTTON -->
  <button type="button" onclick="login()">Login</button>

  <p style="text-align:center;margin-top:10px;">
    Belum punya akun?
    <a href="register.html" style="color:#60a5fa;">Register</a>
  </p>
</div>

<script>
const BASE = "https://website-aditya-production.up.railway.app"

function showPopup(msg,type){
  const popup=document.getElementById("popup")
  popup.innerText=msg
  popup.className="popup "+type
  popup.style.display="block"
  setTimeout(()=>popup.style.display="none",2000)
}

async function login(){
  const username=document.getElementById("username").value
  const password=document.getElementById("password").value

  if(!username || !password){
    showPopup("Isi semua field","error")
    return
  }

  try{
    const res = await fetch(BASE + "/login",{
      method:"POST",
      credentials:"include",
      mode:"cors",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username,password})
    })

    const data = await res.json()

    if(data.success){
  showPopup("Login berhasil","success")

  const check = await fetch(BASE + "/me",{
    credentials:"include"
  })

  const result = await check.json()

  if(result.loggedIn){
    window.location.href="index.html"
  }else{
    showPopup("Username / password salah","error")
  }
}

  }catch(err){
    console.log(err)
    showPopup("Server error","error")
  }
}
</script>

</body>
</html>
