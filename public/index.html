<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>CRUD Website</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: #e2e8f0;
      padding: 20px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
    }

    .logout {
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      background: #ef4444;
      color: white;
      cursor: pointer;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: #1e293b;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    }

    input {
      padding: 14px;
      margin: 8px 0;
      width: 100%;
      border-radius: 10px;
      background: #334155;
      color: white;
      border: none;
    }

    button {
      padding: 12px;
      border-radius: 10px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border: none;
      color: white;
      cursor: pointer;
    }

    .user {
      padding: 15px;
      margin-top: 12px;
      background: #0f172a;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
    }

    .actions { display: flex; gap: 10px; }

    .edit-btn { background: #f59e0b; }
    .delete-btn { background: #ef4444; }

    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 20px;
      border-radius: 8px;
      color: white;
      opacity: 0;
      transition: 0.3s;
    }
  </style>
</head>

<body>

<div class="top">
  <h2 id="welcome"></h2>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container">
  <h2>Data Users</h2>

  <input id="name" placeholder="Nama">
  <input id="email" placeholder="Email">
  <button onclick="add()">Tambah</button>

  <hr>

  <input id="search" placeholder="Cari..." onkeyup="searchUser()">
  <div id="list"></div>
</div>

<div id="toast"></div>

<script>
let allUsers = []

// ❌ HAPUS VALIDASI LOGIN (INI PENYEBAB NENDANG)
// LANGSUNG LOAD
load()

function load() {
  fetch("https://website-aditya-production.up.railway.app/users")
    .then(res => res.json())
    .then(data => {
      allUsers = data
      render(data)
    })
    .catch(err => {
      console.error(err)
      showToast("Server error", "error")
    })
}

function render(data) {
  list.innerHTML = ""
  data.forEach(u => {
    list.innerHTML += `
      <div class="user">
        <div>
          <b>${u.name}</b><br>${u.email}
        </div>
        <div class="actions">
          <button class="delete-btn" onclick="del(${u.id})">Hapus</button>
        </div>
      </div>`
  })
}

function add() {
  const name = document.getElementById("name").value
  const email = document.getElementById("email").value

  if (!name || !email) return showToast("Isi semua", "error")

  fetch("https://website-aditya-production.up.railway.app/users", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({name,email})
  })
  .then(()=> {
    load()
    showToast("Berhasil")
  })
}

function del(id){
  fetch("https://website-aditya-production.up.railway.app/users/"+id,{
    method:"DELETE"
  }).then(()=>load())
}

function searchUser(){
  const k = search.value.toLowerCase()
  render(allUsers.filter(u =>
    u.name.toLowerCase().includes(k) ||
    u.email.toLowerCase().includes(k)
  ))
}

function logout(){
  location.href="login.html"
}

function showToast(msg,type="success"){
  const t=toast
  t.innerText=msg
  t.style.background=type==="error"?"red":"green"
  t.style.opacity=1
  setTimeout(()=>t.style.opacity=0,1500)
}
</script>

</body>
</html>
