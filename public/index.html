<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>CRUD Website</title>

<style>
body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#e2e8f0;
  margin:0;
}

/* HEADER */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
}

.logout{
  background:rgba(239,68,68,0.15);
  color:#ef4444;
  border:1px solid rgba(239,68,68,0.3);
  padding:6px 12px;
  font-size:13px;
  border-radius:8px;
  cursor:pointer;
  transition:.3s;
}
.logout:hover{
  background:#ef4444;
  color:white;
  transform:scale(1.05);
}

/* CONTAINER */
.container{
  max-width:750px;
  margin:40px auto;
  background:#1e293b;
  padding:25px;
  border-radius:18px;
  box-shadow:0 15px 40px rgba(0,0,0,.5);
}

/* INPUT */
input{
  width:100%;
  padding:13px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  background:#334155;
  color:white;
  font-size:14px;
}

/* BUTTON */
button{
  padding:9px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  color:white;
  font-size:13px;
  transition:.25s;
}
button:hover{transform:scale(1.05)}

.btn-add{
  background:linear-gradient(135deg,#3b82f6,#2563eb);
}

/* USER CARD */
.user{
  background:#0f172a;
  padding:14px;
  margin-top:10px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  animation:fadeIn .3s ease;
}

.actions{display:flex;gap:8px}

.edit-btn{background:#f59e0b}
.delete-btn{background:#ef4444}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

/* MODAL FIX */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,.4); /* 🔥 lebih soft */
  backdrop-filter:blur(4px); /* 🔥 blur elegan */
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#1e293b;
  padding:25px;
  border-radius:14px;
  text-align:center;
  transform:scale(.85);
  opacity:0;
  transition:.25s;
}

.modal.show .modal-content{
  transform:scale(1);
  opacity:1;
}

/* TOAST */
#toast{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:10px 16px;
  border-radius:8px;
  font-size:13px;
  color:white;
  opacity:0;
  transform:translateY(20px);
  transition:.3s;
}
</style>
</head>

<body>

<div class="top">
  <h2>Data Users</h2>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container">
  <input id="name" placeholder="Nama">
  <input id="email" placeholder="Email">
  <button class="btn-add" onclick="add()">Tambah</button>

  <hr>

  <input id="search" placeholder="Cari..." onkeyup="searchUser()">
  <div id="list"></div>
</div>

<!-- EDIT -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Edit User</h3>
    <input id="editName">
    <input id="editEmail">
    <br><br>
    <button onclick="updateUser()" class="btn-add">Simpan</button>
    <button onclick="closeModal()">Batal</button>
  </div>
</div>

<!-- DELETE -->
<div id="deleteModal" class="modal">
  <div class="modal-content">
    <h3>Yakin hapus?</h3>
    <br>
    <button onclick="confirmDelete()" class="delete-btn">Hapus</button>
    <button onclick="closeDeleteModal()">Batal</button>
  </div>
</div>

<div id="toast"></div>

<script>
let allUsers=[]
let selectedId=null
let deleteId=null

load()

function load(){
  fetch("https://website-aditya-production.up.railway.app/users")
  .then(res=>res.json())
  .then(data=>{
    allUsers=data
    render(data)
  })
}

function render(data){
  list.innerHTML=""
  data.forEach(u=>{
    list.innerHTML+=`
    <div class="user">
      <div>
        <b>${u.name}</b><br>${u.email}
      </div>
      <div class="actions">
        <button class="edit-btn" onclick="openEdit(${u.id},'${encodeURIComponent(u.name)}','${u.email}')">Edit</button>
        <button class="delete-btn" onclick="openDelete(${u.id})">Hapus</button>
      </div>
    </div>`
  })
}

function add(){
  const name=document.getElementById("name").value
  const email=document.getElementById("email").value

  if(!name||!email) return showToast("Isi semua","error")

  fetch("https://website-aditya-production.up.railway.app/users",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name,email})
  }).then(()=>{
    name.value=""
    email.value=""
    load()
    showToast("Berhasil")
  })
}

// EDIT
function openEdit(id,name,email){
  selectedId=id
  editName.value=decodeURIComponent(name)
  editEmail.value=email
  modal.style.display="flex"
  setTimeout(()=>modal.classList.add("show"),10)
}

function updateUser(){
  fetch("https://website-aditya-production.up.railway.app/users/"+selectedId,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:editName.value,
      email:editEmail.value
    })
  }).then(()=>{
    closeModal()
    load()
    showToast("Updated")
  })
}

// DELETE
function openDelete(id){
  deleteId=id
  deleteModal.style.display="flex"
  setTimeout(()=>deleteModal.classList.add("show"),10)
}

function confirmDelete(){
  fetch("https://website-aditya-production.up.railway.app/users/"+deleteId,{
    method:"DELETE"
  }).then(()=>{
    closeDeleteModal()
    load()
    showToast("Terhapus","error")
  })
}

function closeModal(){
  modal.classList.remove("show")
  setTimeout(()=>modal.style.display="none",200)
}

function closeDeleteModal(){
  deleteModal.classList.remove("show")
  setTimeout(()=>deleteModal.style.display="none",200)
}

function searchUser(){
  const k=search.value.toLowerCase()
  render(allUsers.filter(u=>
    u.name.toLowerCase().includes(k) ||
    u.email.toLowerCase().includes(k)
  ))
}

function logout(){
  location.href="login.html"
}

function showToast(msg,type="success"){
  const t=toast
  t.innerText=msg
  t.style.background=type==="error"?"#ef4444":"#22c55e"
  t.style.opacity=1
  t.style.transform="translateY(0)"
  setTimeout(()=>{
    t.style.opacity=0
    t.style.transform="translateY(20px)"
  },1500)
}
</script>

</body>
</html>
