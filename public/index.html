<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUD Website</title>

<style>


  #list{
  min-height:100px;
  opacity:0.8;
}

  *{
  box-sizing:border-box;
}

/* ================= MOBILE RESPONSIVE ================= */
@media (max-width: 600px){

  /* HEADER FIX */
  .top{
    flex-direction:row;
    justify-content:space-between;
    align-items:center;
    padding:12px 14px;
  }

  .top h2{
    font-size:16px;
  }

  .logout{
    width:auto;
    padding:6px 10px;
    font-size:12px;
  }

  /* CONTAINER FIX */
  .container{
    margin:12px;
    padding:14px;
    border-radius:12px;
  }

  /* INPUT */
  input{
    padding:9px;
    font-size:13px;
  }

  /* BUTTON FIX (BIAR GA GENDUT) */
  button{
    padding:9px;
    font-size:13px;
  }

  .btn-add{
    margin-top:5px;
  }

  /* USER CARD */
  .user{
    padding:10px;
    gap:6px;
  }

  .user b{
    font-size:13px;
  }

  .user div{
    font-size:12px;
  }

  /* ACTION BUTTON */
  .actions button{
    padding:7px;
    font-size:11px;
  }

  /* MODAL */
  .modal-content{
    width:92%;
    padding:16px;
  }
}

body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#e2e8f0;
  margin:0;
}

/* HEADER */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
}

.logout{
  background:rgba(239,68,68,0.15);
  color:#ef4444;
  border:1px solid rgba(239,68,68,0.3);
  padding:6px 12px;
  font-size:13px;
  border-radius:8px;
  cursor:pointer;
  transition:.3s;
}
.logout:hover{
  background:#ef4444;
  color:white;
  transform:scale(1.05);
}

/* CONTAINER */
.container{
  max-width:750px;
  width:100%;
  margin:40px auto;
  background:#1e293b;
  padding:25px;
  border-radius:18px;
  box-shadow:0 15px 40px rgba(0,0,0,.5);
}

/* INPUT */
input{
  width:100%;
  padding:13px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  background:#334155;
  color:white;
  font-size:14px;
}

/* BUTTON */
button{
  padding:9px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  color:white;
  font-size:13px;
  transition:.25s;
}
button:hover{transform:scale(1.05)}

.btn-add{
  background:linear-gradient(135deg,#3b82f6,#2563eb);
}

/* USER CARD */
.user{
  background:#0f172a;
  padding:14px;
  margin-top:10px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  animation:fadeIn .3s ease;
}

.actions{display:flex;gap:8px}

.edit-btn{background:#f59e0b}
.delete-btn{background:#ef4444}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,.4);
  backdrop-filter:blur(4px);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#1e293b;
  padding:25px;
  border-radius:14px;
  text-align:center;
  transform:scale(.85);
  opacity:0;
  transition:.25s;
}

.modal.show .modal-content{
  transform:scale(1);
  opacity:1;
}

/* TOAST */
#toast{
  position:fixed;
  bottom:20px;
  left: 50%;
  right:auto;
  padding:10px 16px;
  border-radius:8px;
  font-size:13px;
  color:white;
  opacity:0;
  transform:translateX(-50%) translateY(20px);
  transition:.3s;
}

.btn-cancel{
  background:#e5e7eb;
  color:#1e293b;
}

.btn-cancel:hover{
  background:#cbd5f5;
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.skeleton{
  background: linear-gradient(
    90deg,
    #1e293b 25%,
    #334155 50%,
    #1e293b 75%
  );
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  border-radius:8px;
}

@keyframes shimmer{
  0%{background-position:-200% 0}
  100%{background-position:200% 0}
}

.skeleton-card{
  padding:14px;
  margin-top:10px;
  border-radius:10px;
  background:#0f172a;
}

.skeleton-line{
  height:12px;
  margin-bottom:8px;
}

</style>
</head>

<body>

<div class="top">
  <h2>Data Users</h2>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container" style="margin-bottom:20px;">
  <h3>Dashboard</h3>
  <div id="stats"></div>
</div>

<div class="container">
  <h3>Ganti Password</h3>

  <input id="oldPass" type="password" placeholder="Password Lama">
  <input id="newPass" type="password" placeholder="Password Baru">

  <button onclick="changePassword()" class="btn-add">
    Ganti Password
  </button>
</div>

<div class="container">
  <input id="name" placeholder="Nama">
  <input id="email" placeholder="Email">
  <button class="btn-add" onclick="add()">Tambah</button>

  <hr>

  <input id="search" placeholder="Cari..." onkeyup="searchUser()">
  <div id="list"></div>
</div>

<!-- EDIT -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Edit User</h3>
    <input id="editName">
    <input id="editEmail">
    <br><br>
    <button onclick="updateUser(event)" class="btn-add">Simpan</button>
    <button onclick="closeModal()" class="btn-cancel">Batal</button>
  </div>
</div>

<!-- DELETE -->
<div id="deleteModal" class="modal">
  <div class="modal-content">
    <h3>Yakin hapus?</h3>
    <br>
    <button onclick="confirmDelete(event)" class="delete-btn">Hapus</button>
    <button onclick="closeDeleteModal()" class="btn-cancel">Batal</button>
  </div>
</div>

<div id="toast"></div>

<script>
const BASE = "https://website-aditya-production.up.railway.app"

let allUsers=[]
let selectedId=null
let deleteId=null
let currentUser=null

const list = document.getElementById("list")
const modal = document.getElementById("modal")
const deleteModal = document.getElementById("deleteModal")
const editName = document.getElementById("editName")
const editEmail = document.getElementById("editEmail")
const search = document.getElementById("search")
const toast = document.getElementById("toast")
const addBtn = document.querySelector(".btn-add")

// 🔐 INIT
async function init(){
  try{
    const res = await fetch(BASE + "/me", {
      credentials: "include"
    })

    const data = await res.json()

    if(!data.loggedIn){
      return window.location.href="login.html"
    }

    currentUser = data.user

    // 🔥 HIDE BUTTON TAMBAH
    if(currentUser.role !== "admin"){
      addBtn.style.display = "none"
    }

    load()
    loadStats()

  }catch{
    window.location.href="login.html"
  }
}

init()

// LOAD
function load(){
  showSkeleton() // 🔥 tampilkan skeleton dulu

  fetch(BASE + "/users",{ credentials:"include" })
  .then(res=>res.json())
  .then(data=>{
    allUsers=data
    render(data) // nanti skeleton hilang otomatis
  })
  .catch(()=>{
    showToast("Server error","error")
  })
}

// 🔥 RENDER (FIX ROLE)
function render(data){
  if(data.length === 0){
  list.innerHTML = "<p style='text-align:center;opacity:0.6'>Belum ada data</p>"
  return
}
  list.innerHTML=""

  data.forEach(u=>{
    list.innerHTML+=`
    <div class="user">
      <div>
        <b>${u.name}</b><br>${u.email}
      </div>

      <div class="actions">
        ${
          currentUser.role === "admin"
          ? `
            <button class="edit-btn" onclick="openEdit(${u.id},'${encodeURIComponent(u.name)}','${u.email}')">Edit</button>
            <button class="delete-btn" onclick="openDelete(${u.id})">Hapus</button>
          `
          : ""
        }
      </div>

    </div>`
  })
}

// ADD
function add(){
  if(currentUser.role !== "admin"){
    return showToast("Tidak diizinkan","error")
  }

  const name=document.getElementById("name").value.trim()
  const email=document.getElementById("email").value.trim()

  if(!name || !email){
  return showToast("Isi semua","error")
}

if(!email.includes("@")){
  return showToast("Email tidak valid","error")
}

  showSkeleton()
  addBtn.disabled = true

  fetch(BASE + "/users",{
    method:"POST",
    credentials:"include",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name,email})
  }).then(()=>{
    document.getElementById("name").value=""
    document.getElementById("email").value=""
    load()
    showToast("Berhasil")
  }).finally(()=>{
    addBtn.disabled = false
  })
}

// EDIT
function openEdit(id,name,email){
  if(currentUser.role !== "admin") return

  selectedId=id
  editName.value=decodeURIComponent(name)
  editEmail.value=email
  modal.style.display="flex"
  setTimeout(()=>modal.classList.add("show"),10)
}

function updateUser(e){
  const btn = e.target
  btn.disabled = true

  fetch(BASE + "/users/"+selectedId,{
    method:"PUT",
    credentials:"include",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:editName.value,
      email:editEmail.value
    })
  }).then(()=>{
    closeModal()
    load()
    showToast("Updated")
  }).finally(()=>{
    btn.disabled = false
  })
}

// DELETE
function openDelete(id){
  if(currentUser.role !== "admin") return

  deleteId=id
  deleteModal.style.display="flex"
  setTimeout(()=>deleteModal.classList.add("show"),10)
}

function confirmDelete(e){
  const btn = e.target
  btn.disabled = true

  fetch(BASE + "/users/"+deleteId,{
    method:"DELETE",
    credentials:"include"
  }).then(()=>{
    closeDeleteModal()
    load()
    showToast("Terhapus","error")
  }).finally(()=>{
    btn.disabled = false
  })
}

// CLOSE MODAL
function closeModal(){
  modal.classList.remove("show")
  setTimeout(()=>modal.style.display="none",200)
}

function closeDeleteModal(){
  deleteModal.classList.remove("show")
  setTimeout(()=>deleteModal.style.display="none",200)
}

// SEARCH
function searchUser(){
  const k=search.value.toLowerCase()
  render(allUsers.filter(u=>
    u.name.toLowerCase().includes(k) ||
    u.email.toLowerCase().includes(k)
  ))
}

// LOGOUT
function logout(){
  fetch(BASE + "/logout",{ credentials:"include" })
  .then(()=>{
    window.location.href="login.html"
  })
}

//STATS
async function loadStats(){
  try{
    const res = await fetch(BASE + "/stats", {
      credentials: "include"
    })

    const data = await res.json()

    document.getElementById("stats").innerHTML = `
      <p>Total Data: <b>${data.totalUsers}</b></p>
      <p>Total Akun: <b>${data.totalAccounts}</b></p>
      <p>Login sebagai: <b>${currentUser.username}</b></p>
    `
  }catch{
    showToast("Gagal load stats","error")
  }
}

// TOAST
function showToast(msg,type="success"){
  toast.innerText=msg
  toast.style.background=type==="error"?"#ef4444":"#22c55e"
  toast.style.opacity=1
  toast.style.transform="translateY(0)"
  setTimeout(()=>{
    toast.style.opacity=0
    toast.style.transform="translateY(20px)"
  },1500)
}
</script>


<script>
  function showSkeleton(){
  list.innerHTML = ""

  for(let i=0;i<5;i++){
    list.innerHTML += `
      <div class="skeleton-card">
        <div class="skeleton skeleton-line" style="width:60%"></div>
        <div class="skeleton skeleton-line" style="width:40%"></div>
      </div>
    `
  }
}
</script>

<script>
 function changePassword(){
  const btn = event.target
  btn.disabled = true

  const oldPassword = document.getElementById("oldPass").value
  const newPassword = document.getElementById("newPass").value

  if(!oldPassword || !newPassword){
    btn.disabled = false
    return showToast("Isi semua field","error")
  }

  fetch(BASE + "/change-password",{
    method:"POST",
    credentials:"include",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({ oldPassword, newPassword })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.success){
      showToast("Password berhasil diubah")
      document.getElementById("oldPass").value=""
      document.getElementById("newPass").value=""
    }else{
      showToast(data.message || "Gagal","error")
    }
  })
  .finally(()=>{
    btn.disabled = false
  })
}
</script>


</body>
</html>
